<h2>Productos</h2>

<p *ngIf="cargando">Cargando productos...</p>

<p *ngIf="error">{{ error }}</p>

<div *ngIf="!cargando && productos.length === 0">
  No hay productos
</div>

<div *ngIf="!cargando">
  <div *ngFor="let p of productos" class="card">
    <h3>{{ p.nombre }}</h3>
    <p>{{ p.descripcion }}</p>
    <p>Precio: {{ p.precio }} €</p>
    <p>Stock: {{ p.stock }}</p>
  </div>
</div>
